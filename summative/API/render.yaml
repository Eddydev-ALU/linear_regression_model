# render.yaml – Render Blueprint for auto-deploy
services:
  - type: web
    name: life-expectancy-api
    runtime: python
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn prediction:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"