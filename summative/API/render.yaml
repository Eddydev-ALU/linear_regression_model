# render.yaml – Render Blueprint for auto-deploy
services:
  - type: web
    name: life-expectancy-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"